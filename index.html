<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HueLog</title>
        <link rel="stylesheet" href="style.css">
        <link rel="manifest" href="manifest.json">
        <link rel="icon" href="icons/icon-192.png">
        <meta name="theme-color" content="#7F77DD">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="HueLog">
    </head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <span class="app-name">HueLog</span>
      <span class="app-tagline" id="greeting"></span>
      <span class="app-date" id="date"></span>
    </header>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active">Write</button>
      <button class="mode-btn">Colour</button>
      <button class="mode-btn">History</button>
    </div>

    <!-- WRITE SECTION -->
    <div id="write-section">

      <div class="mood-row">
        <div class="mood-item"><div class="mood-circle">😴</div><span>tired</span></div>
        <div class="mood-item"><div class="mood-circle">😐</div><span>okay</span></div>
        <div class="mood-item"><div class="mood-circle">😊</div><span>good</span></div>
        <div class="mood-item"><div class="mood-circle">🤩</div><span>great</span></div>
        <div class="mood-item"><div class="mood-circle">😔</div><span>low</span></div>
      </div>

      <div class="prompt-box">
        <span class="prompt-label">TODAY'S NUDGE</span>
        <p class="prompt-text" id="prompt"></p>
      </div>

      <textarea class="write-area" placeholder="Start writing here..."></textarea>

      <div class="todo-section">
        <div class="todo-header">
          <span class="todo-label">TODAY'S TODOS</span>
          <span class="todo-count" id="todo-count">0/0</span>
        </div>
        <div class="todo-input-row">
          <input type="text" class="todo-input" id="todo-input" placeholder="Add a todo and press Enter...">
        </div>
        <div class="todo-list" id="todo-list"></div>
      </div>

      <button class="save-btn">Save today's entry</button>

      <div class="divider"><span>or colour instead</span></div>

      <div class="mandala-card" onclick="switchToColour()">
        <div class="mandala-icon">🎨</div>
        <div>
          <p class="mandala-title">Colour a mandala</p>
          <p class="mandala-sub">When words aren't enough</p>
        </div>
      </div>

    </div>

    <!-- COLOUR SECTION -->
    <div id="colour-section" class="hidden">

      <div class="mandala-header">
        <p class="mandala-mode-title">Colour your mood</p>
        <p class="mandala-mode-sub">Pick a colour and tap any section</p>
      </div>

      <div class="colour-palette" id="colour-palette">
        <div class="colour-dot active" data-colour="#7F77DD" style="background:#7F77DD"></div>
        <div class="colour-dot" data-colour="#D4537E" style="background:#D4537E"></div>
        <div class="colour-dot" data-colour="#1D9E75" style="background:#1D9E75"></div>
        <div class="colour-dot" data-colour="#EF9F27" style="background:#EF9F27"></div>
        <div class="colour-dot" data-colour="#378ADD" style="background:#378ADD"></div>
        <div class="colour-dot" data-colour="#D85A30" style="background:#D85A30"></div>
        <div class="colour-dot" data-colour="#AFA9EC" style="background:#AFA9EC"></div>
        <div class="colour-dot" data-colour="#5DCAA5" style="background:#5DCAA5"></div>
        <div class="colour-dot" data-colour="#FAC775" style="background:#FAC775"></div>
        <div class="colour-dot" data-colour="#ED93B1" style="background:#ED93B1"></div>
        <div class="colour-dot" data-colour="#F7F3EE" style="background:#F7F3EE;border:1px solid #E8E4DC"></div>
        <div class="colour-dot eraser" data-colour="eraser" style="background:#FDFCFA;border:1px solid #E8E4DC">✕</div>
      </div>

      <div class="mandala-canvas-wrap" id="mandala-container"></div>

      <div class="mandala-controls">
        <button class="mandala-ctrl-btn" id="undo-btn">↩ Undo</button>
        <button class="mandala-ctrl-btn" id="reset-btn">↺ Reset</button>
        <button class="mandala-save-btn" id="mandala-save-btn">Save as entry 🎨</button>
      </div>

    </div>

    <!-- HISTORY SECTION -->
    <div id="history-section" class="hidden">

      <div class="streak-box">
        <div class="streak-left">
          <span class="streak-flame">🔥</span>
          <span class="streak-count" id="streak-count">0</span>
        </div>
        <div class="streak-right">
          <p class="streak-label">day streak</p>
          <p class="streak-sub">keep it going!</p>
        </div>
      </div>

      <h3 class="history-title">Your entries</h3>
      <div id="entries-list"></div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="nav-item active" onclick="switchMode('write', 0)">🏠</div>
      <div class="nav-item" onclick="switchMode('colour', 1)">🎨</div>
      <div class="nav-item" onclick="switchMode('history', 2)">🔥</div>
      <div class="nav-item" onclick="switchMode('profile', 3)">👤</div>
    </nav>

    <div class="toast" id="toast"></div>

  </div>
  <script src="app.js"></script>
</body>
</html>
