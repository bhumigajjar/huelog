<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HueLog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <span class="app-name">HueLog</span>
      <span class="app-tagline" id="greeting"></span>
      <span class="app-date" id="date"></span>
    </header>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active">Write</button>
      <button class="mode-btn">Colour</button>
      <button class="mode-btn">History</button>
    </div>

    <!-- Mood Row -->
    <div class="mood-row">
      <div class="mood-item">
        <div class="mood-circle">😴</div>
        <span>tired</span>
      </div>
      <div class="mood-item">
        <div class="mood-circle">😐</div>
        <span>okay</span>
      </div>
      <div class="mood-item">
        <div class="mood-circle">😊</div>
        <span>good</span>
      </div>
      <div class="mood-item">
        <div class="mood-circle">🤩</div>
        <span>great</span>
      </div>
      <div class="mood-item">
        <div class="mood-circle">😔</div>
        <span>low</span>
      </div>
    </div>

    <!-- Prompt Box -->
    <div class="prompt-box">
      <span class="prompt-label">TODAY'S NUDGE</span>
      <p class="prompt-text" id="prompt"></p>
    </div>

    <!-- Write Area -->
    <textarea class="write-area" placeholder="Start writing here..."></textarea>

    <!-- Save Button -->
    <button class="save-btn">Save today's entry</button>

    <!-- Divider -->
    <div class="divider">
      <span>or colour instead</span>
    </div>

    <!-- Mandala Shortcut -->
    <div class="mandala-card">
      <div class="mandala-icon">🎨</div>
      <div>
        <p class="mandala-title">Colour a mandala</p>
        <p class="mandala-sub">When words aren't enough</p>
      </div>
    </div>

    <!-- History Preview -->
    <div class="history-section">
    <h3 class="history-title">Recent entries</h3>
    <div id="entries-list"></div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="nav-item active">🏠</div>
      <div class="nav-item">🎨</div>
      <div class="nav-item">🔥</div>
      <div class="nav-item">👤</div>
    </nav>

  </div>
  <script src="app.js"></script>
</body>
</html>
